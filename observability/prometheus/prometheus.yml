global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - 127.0.0.1:9090

  - job_name: cadvisor
    static_configs:
      - targets:
          - cadvisor:8080

  - job_name: dslab-probes
    metrics_path: /metrics
    static_configs:
      - targets:
          - 10.10.1.10:8080
          - 10.10.2.10:8080
          - 10.10.3.10:8080
